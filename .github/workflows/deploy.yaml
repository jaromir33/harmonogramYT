name: Deploy Quartz to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:          # możliwość ręcznego uruchomienia z UI GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22     # 22 LTS — stabilny, zgodny z Quartz

      - name: Zainstaluj zależności
        run: npm install

      # ── KLUCZOWY KROK: generuj schedule.md z CSV przed buildem Quartz ──
      - name: Generuj harmonogram z CSV
        run: node scripts/build.js

      - name: Zbuduj Quartz
        run: npx quartz build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v5
